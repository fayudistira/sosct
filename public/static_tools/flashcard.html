      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "Poppins", "Segoe UI", Roboto, sans-serif;
      }

      body {
        background: linear-gradient(145deg, #f8f0e7 0%, #f2e3d5 100%);
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        padding: 12px;
      }

      .app-container {
        max-width: 600px;
        width: 100%;
        background: rgba(255, 255, 255, 0.6);
        backdrop-filter: blur(8px);
        border-radius: 40px 40px 32px 32px;
        box-shadow:
          0 20px 40px rgba(0, 0, 0, 0.15),
          0 4px 12px rgba(0, 0, 0, 0.1);
        padding: 20px 16px 24px;
        border: 1px solid rgba(255, 255, 255, 0.5);
      }

      .header {
        text-align: center;
        margin-bottom: 16px;
      }

      .header h1 {
        font-size: 2rem;
        font-weight: 600;
        background: linear-gradient(135deg, #b43b3b, #6d2e2e);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        letter-spacing: 1px;
      }

      .header p {
        color: #5f4e3c;
        font-weight: 300;
        font-size: 0.95rem;
        background: rgba(255, 245, 235, 0.8);
        display: inline-block;
        padding: 4px 16px;
        border-radius: 40px;
        backdrop-filter: blur(4px);
        margin-top: 6px;
        border: 1px solid #e9d9cb;
      }

      /* FLASHCARD */
      .card-wrapper {
        margin: 8px 0 16px;
        cursor: pointer;
      }

      .flip-container {
        perspective: 1500px;
        width: 100%;
        min-height: 280px;
      }

      .flip-card {
        position: relative;
        width: 100%;
        min-height: 280px;
        transition: transform 0.4s ease-in-out;
        transform-style: preserve-3d;
        border-radius: 28px;
        box-shadow: 0 12px 24px -8px rgba(80, 50, 30, 0.3);
      }

      .flip-card.flipped {
        transform: rotateY(180deg);
      }

      .card-front,
      .card-back {
        position: absolute;
        width: 100%;
        min-height: 280px;
        backface-visibility: hidden;
        border-radius: 28px;
        padding: 20px 16px;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        background: #ffffffdd;
        backdrop-filter: blur(12px);
        border: 2px solid rgba(255, 240, 230, 0.9);
        box-shadow:
          inset 0 2px 8px rgba(255, 255, 255, 0.8),
          0 8px 18px rgba(100, 60, 30, 0.15);
      }

      .card-front {
        background: linear-gradient(125deg, #fff9f2, #fff1e6);
      }

      .card-back {
        background: linear-gradient(125deg, #f5efe9, #faeadc);
        transform: rotateY(180deg);
      }

      .hanzi {
        font-size: 7rem;
        font-weight: 400;
        line-height: 1.1;
        margin-bottom: 8px;
        text-shadow:
          2px 2px 0 #ffe3d0,
          4px 4px 0 rgba(180, 100, 50, 0.1);
        color: #3e2c1a;
      }

      .pinyin {
        font-size: 2.2rem;
        font-weight: 400;
        color: #b45f3a;
        background: #f5e1d4;
        padding: 6px 24px;
        border-radius: 60px;
        letter-spacing: 1px;
        margin-bottom: 12px;
        border: 1px solid #eccbb8;
      }

      .arti {
        font-size: 1.5rem;
        font-weight: 400;
        color: #2b4b3b;
        background: #dff0e6;
        padding: 8px 20px;
        border-radius: 40px;
        border: 1px solid #b8d9cc;
        margin: 6px 0;
        text-align: center;
        width: 100%;
      }

      .arti-eng {
        font-size: 1.4rem;
        background: #e3dac9;
        color: #4f4232;
        border-color: #c8b59c;
      }

      .label-badge {
        align-self: flex-start;
        font-size: 0.85rem;
        color: #886e54;
        background: #ece1d6;
        padding: 4px 12px;
        border-radius: 30px;
        margin-bottom: 6px;
        font-weight: 300;
        border: 1px solid #dacbbc;
      }

      .hint-text {
        font-size: 1rem;
        color: #9b7a62;
        margin-top: 6px;
        background: rgba(230, 210, 190, 0.3);
        padding: 4px 12px;
        border-radius: 40px;
      }

      /* info bar */
      .info-bar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        background: #f2e3d8c9;
        backdrop-filter: blur(8px);
        padding: 10px 16px;
        border-radius: 60px;
        margin: 16px 0 14px;
        border: 1px solid #edd7c9;
      }

      .card-counter {
        background: #a77b5b;
        color: white;
        padding: 5px 18px;
        border-radius: 40px;
        font-weight: 500;
        font-size: 1rem;
        box-shadow: inset 0 -2px 0 #5e3e2b;
      }

      .mode-indicator {
        background: #c9ad97;
        color: #2d1f14;
        padding: 4px 16px;
        border-radius: 30px;
        font-size: 0.85rem;
        font-weight: 400;
      }

      .nav-buttons {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 10px;
        margin-top: 6px;
      }

      .btn {
        background: white;
        border: none;
        padding: 12px 16px;
        border-radius: 50px;
        font-size: 1.1rem;
        font-weight: 500;
        color: #4d3b2a;
        box-shadow:
          0 4px 0 #cbad93,
          0 6px 12px rgba(110, 70, 40, 0.2);
        transition: 0.1s ease-out;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 5px;
        cursor: pointer;
        border: 2px solid #ffeede;
        flex: 1 0 auto;
        min-width: 100px;
      }

      .btn:active {
        transform: translateY(4px);
        box-shadow:
          0 2px 0 #cbad93,
          0 4px 8px rgba(110, 70, 40, 0.15);
      }

      .btn:disabled {
        opacity: 0.4;
        transform: translateY(0);
        box-shadow: 0 3px 0 #b39b86;
        pointer-events: none;
      }

      .btn-flip {
        background: #b3d9c0;
        color: #1b4e3a;
        box-shadow: 0 4px 0 #6f9a81;
      }

      .btn-shuffle {
        background: #f3d8bf;
        color: #7b4d2e;
        box-shadow: 0 4px 0 #c9a27e;
      }

      .btn-reset {
        background: #cfb7aa;
        color: #3f2d1f;
        box-shadow: 0 4px 0 #9d8472;
      }

      .btn-sound {
        background: #d4c0ae;
        color: #3f2d1f;
        box-shadow: 0 4px 0 #a48d78;
      }

      .footer-note {
        text-align: center;
        margin-top: 22px;
        color: #7c6050;
        font-size: 0.9rem;
        font-weight: 300;
        border-top: 1px dashed #dac1af;
        padding-top: 14px;
      }

      .footer-note span {
        font-weight: 500;
        background: #f2d5c0;
        padding: 2px 10px;
        border-radius: 30px;
      }

      /* penyesuaian mobile ekstra */
      @media (max-width: 500px) {
        .app-container {
          padding: 16px 12px 20px;
        }
        .hanzi {
          font-size: 5.5rem;
        }
        .pinyin {
          font-size: 1.8rem;
        }
        .arti {
          font-size: 1.2rem;
        }
        .btn {
          min-width: 70px;
          padding: 10px 10px;
          font-size: 1rem;
        }
        .header h1 {
          font-size: 1.8rem;
        }
        .flip-container,
        .flip-card,
        .card-front,
        .card-back {
          min-height: 250px;
        }
        .card-front,
        .card-back {
          padding: 16px 12px;
        }
      }
    </style>

        // --- state ---
        let currentList = originalFlashcards.slice();
        let currentIndex = 0;
        let isFlipped = false;
        let lastSpokenHanzi = ""; // untuk menghindari pengulangan suara saat flip

        // --- elemen DOM ---
        const flipCardEl = document.getElementById("flipCard");
        const hanziFront = document.getElementById("hanziFront");
        const pinyinBack = document.getElementById("pinyinBack");
        const artiIndo = document.getElementById("artiIndo");
        const artiEng = document.getElementById("artiEng");
        const cardCounter = document.getElementById("cardCounter");
        const modeIndicator = document.getElementById("modeIndicator");

        const prevBtn = document.getElementById("prevBtn");
        const nextBtn = document.getElementById("nextBtn");
        const flipBtn = document.getElementById("flipBtn");
        const shuffleBtn = document.getElementById("shuffleBtn");
        const resetBtn = document.getElementById("resetBtn");

        // --- Fungsi TTS Mandarin ---
        function speakChinese(text) {
          if (!window.speechSynthesis) {
            console.log("TTS tidak didukung di browser ini.");
            return;
          }
          // Batalkan ucapan sebelumnya agar tidak bertumpuk
          window.speechSynthesis.cancel();

          const utterance = new SpeechSynthesisUtterance(text);
          utterance.lang = "zh-CN"; // Mandarin
          utterance.rate = 0.9; // sedikit lebih lambat untuk pendengar pemula
          utterance.pitch = 1.0;
          utterance.volume = 1.0;
          window.speechSynthesis.speak(utterance);
        }

        // --- helper: acak array (Fisher-Yates) ---
        function shuffleArray(arr) {
          const a = arr.slice();
          for (let i = a.length - 1; i > 0; i--) {
            const j = Math.floor(Math.random() * (i + 1));
            [a[i], a[j]] = [a[j], a[i]];
          }
          return a;
        }

        // --- render kartu berdasarkan currentList & index ---
        function renderCard() {
          if (
            !currentList.length ||
            currentIndex < 0 ||
            currentIndex >= currentList.length
          )
            return;
          const card = currentList[currentIndex];
          hanziFront.textContent = card.hanzi;
          pinyinBack.textContent = card.pinyin;
          artiIndo.textContent = card.indonesia;
          artiEng.textContent = card.english;

          // update flip class
          if (isFlipped) {
            flipCardEl.classList.add("flipped");
          } else {
            flipCardEl.classList.remove("flipped");
          }

          cardCounter.textContent = `${currentIndex + 1} / ${currentList.length}`;

          // update mode indicator
          if (
            currentList.length === originalFlashcards.length &&
            currentList.every((val, idx) => val === originalFlashcards[idx])
          ) {
            modeIndicator.textContent = "📖 urut asli";
            modeIndicator.style.background = "#c9ad97";
          } else {
            modeIndicator.textContent = "🎲 mode acak";
            modeIndicator.style.background = "#e1bba3";
          }

          prevBtn.disabled = currentIndex === 0;
          nextBtn.disabled = currentIndex === currentList.length - 1;

          // === TTS OTOMATIS: bicarakan hanzi jika konten berubah ===
          if (card.hanzi !== lastSpokenHanzi) {
            speakChinese(card.hanzi);
            lastSpokenHanzi = card.hanzi;
          }
        }

        // --- event: klik kartu untuk flip ---
        flipCardEl.addEventListener("click", (e) => {
          isFlipped = !isFlipped;
          renderCard(); // saat flip, hanzi sama, TTS tidak dipicu (karena lastSpokenHanzi tidak berubah)
        });

        flipBtn.addEventListener("click", () => {
          isFlipped = !isFlipped;
          renderCard();
        });

        prevBtn.addEventListener("click", () => {
          if (currentIndex > 0) {
            currentIndex--;
            isFlipped = false;
            renderCard(); // akan memicu TTS jika hanzi baru
          }
        });

        nextBtn.addEventListener("click", () => {
          if (currentIndex < currentList.length - 1) {
            currentIndex++;
            isFlipped = false;
            renderCard();
          }
        });

        shuffleBtn.addEventListener("click", () => {
          currentList = shuffleArray(originalFlashcards);
          currentIndex = 0;
          isFlipped = false;
          lastSpokenHanzi = ""; // reset agar TTS tetap aktif untuk kata pertama
          renderCard();
        });

        resetBtn.addEventListener("click", () => {
          currentList = originalFlashcards.slice();
          currentIndex = 0;
          isFlipped = false;
          lastSpokenHanzi = "";
          renderCard();
        });

        // inisialisasi pertama
        renderCard(); // akan memicu TTS untuk kartu pertama (爱)
      })();
